<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card bg-dark text-white p-4 shadow-lg" style="width: 400px; border: 1px solid #333;">
    <h2 class="text-center mb-4">Вход в MY-KINO</h2>
    
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" class="form-control bg-secondary text-white border-0" [(ngModel)]="credentials.username">
    </div>
    
    <div class="mb-4">
      <label class="form-label">Пароль</label>
      <input type="password" class="form-control bg-secondary text-white border-0" [(ngModel)]="credentials.password">
    </div>
    
    <button class="btn btn-danger w-100 fw-bold" (click)='onLogin()'>Войти</button>
    
    <p class="text-center mt-3 text-secondary">
      <small>Нет аккаунта? Обратитесь к администратору.</small>
    </p>
  </div>
</div>
